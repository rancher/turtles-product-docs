---
name: "Updatecli daily"

on:
  # run daily or manually
  workflow_dispatch:
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron: '0 12 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  updatecli:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6

      - name: "Install updatecli"
        uses: "updatecli/updatecli-action@7fea18dfb6a2d7077cd040e48ed658009bee5c6f" # v2
        
      - name: "Install Releasepost"
        uses: "updatecli/releasepost-action@864390bddae97db06ee881ab4a08d159b4464643" # v0.5.0

      - name: Run Updatecli in enforce mode
        run: "updatecli compose apply --file updatecli-compose.yaml"
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASEPOST_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
